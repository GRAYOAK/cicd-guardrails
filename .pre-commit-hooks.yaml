- id: cicd-sec-04-poisoned-pipeline
  name: CICD-SEC-04-POISONED-PIPELINE (pull_request_target)
  description: Detects pull_request_target usage in workflow files.
  entry: scripts/checks/domain/cicd_sec_04_poisoned_pipeline.sh .
  language: script
  pass_filenames: false
  files: ^\.github/workflows/.*\.(yml|yaml)$

- id: cicd-sec-08-action-pinning
  name: CICD-SEC-08-ACTION-PINNING (Action SHA-Pinning)
  description: Detects mutable third-party action references.
  entry: scripts/checks/domain/cicd_sec_08_action_pinning.sh .
  language: script
  pass_filenames: false
  files: ^actions/.*/action\.(yml|yaml)$

- id: cicd-sec-05-permissions
  name: CICD-SEC-05-PERMISSIONS (Workflow permissions)
  description: Ensures workflow and job permissions blocks exist.
  entry: scripts/checks/domain/cicd_sec_05_permissions.sh .
  language: script
  pass_filenames: false
  files: ^\.github/workflows/.*\.(yml|yaml)$

- id: cicd-sec-05-runner-access
  name: CICD-SEC-05-RUNNER-ACCESS (Runner access policy)
  description: Detects generic self-hosted runner labels.
  entry: scripts/checks/domain/cicd_sec_05_runner_access.sh .
  language: script
  pass_filenames: false
  files: ^\.github/workflows/.*\.(yml|yaml)$

- id: cicd-sec-07-runner-hardening
  name: CICD-SEC-07-RUNNER-HARDENING (Runner hardening)
  description: Detects privileged options and unsafe runner patterns.
  entry: scripts/checks/domain/cicd_sec_07_runner_hardening.sh .
  language: script
  pass_filenames: false
  files: ^\.github/workflows/.*\.(yml|yaml)$

- id: cicd-sec-03-dependency-chain
  name: CICD-SEC-03-DEPENDENCY-CHAIN (Dependency chain)
  description: Ensures lock files, pinned dependencies, workflow SHAs, and Dockerfile digests.
  entry: scripts/checks/domain/cicd_sec_03_dependency_chain.sh .
  language: script
  pass_filenames: false
  files: (^|.*/)(package\.json|package-lock\.json|pnpm-lock\.yaml|yarn\.lock|pyproject\.toml|requirements[^/]*\.txt|go\.mod|go\.sum|Cargo\.toml|Cargo\.lock|Gemfile|Gemfile\.lock|composer\.json|composer\.lock|Dockerfile[^/]*|\.github/workflows/.*\.(yml|yaml))$

- id: cicd-sec-06-secret-scan
  name: CICD-SEC-06-SECRET-SCAN (Secret scanning)
  description: Runs secret scanning manually when gitleaks is available.
  entry: scripts/checks/domain/cicd_sec_06_secret_scan.sh .
  language: script
  pass_filenames: false
  stages: [manual]
