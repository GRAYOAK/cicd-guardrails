# Human-readable documentation of effective file-scan defaults in this repository.
# Runtime in consumer checkouts reads only `.guardrails.file-patterns.yml` when present;
# built-in find excludes live in the guardrails scripts, and Python policy defaults ship
# in the flat YAML next to this file (see package_policy.python below as a mirror).
# Do not require copying this file into consumer repositories.
#
# policy_handler / artifact        implementation (relative to guardrails repo)
# ---------------------------------------------------------------------------
# js_ts / package.json              scripts/checks/domain/package/js_ts.sh — cicd_sec_03_audit_js_ts_package_json
# js_ts / package-lock.json        same — cicd_sec_03_audit_js_ts_lock_package_lock
# js_ts / yarn.lock                same — cicd_sec_03_audit_js_ts_lock_yarn
# js_ts / pnpm-lock.yaml           same — cicd_sec_03_audit_js_ts_lock_pnpm
# python / (directory policy)      scripts/config/package_policy.defaults.yml + scripts/lib/package_policy.sh + scripts/checks/domain/package/python.sh — cicd_sec_03_run_python_package_policy
# go / go.mod                      scripts/checks/domain/package/go.sh — cicd_sec_03_audit_go_mod
# go / go.sum                      same — cicd_sec_03_audit_go_sum
# rust / Cargo.toml                scripts/checks/domain/package/rust.sh — cicd_sec_03_audit_rust_cargo_toml
# rust / Cargo.lock                same — cicd_sec_03_audit_rust_cargo_lock
# ruby / Gemfile                   scripts/checks/domain/package/ruby.sh — cicd_sec_03_audit_ruby_gemfile
# ruby / Gemfile.lock              same — cicd_sec_03_audit_ruby_gemfile_lock
# php / composer.json              scripts/checks/domain/package/php.sh — cicd_sec_03_audit_php_composer_json
# php / composer.lock              same — cicd_sec_03_audit_php_composer_lock
# workflows / *.yml, *.yaml       scripts/lib/action_pin_audit.sh — action_pin_scan_file (ecosystem workflows)
# docker / Dockerfile*             scripts/lib/dockerfile_pin_audit.sh — dockerfile_pin_scan_file
# composite-action / action.yml  scripts/lib/action_pin_audit.sh — action_pin_scan_file (ecosystem composite-action)

version: 1
# Mirror of built-in find excludes (consumer overlays add more; they do not replace these).
global_excludes:
  - "*/.git/*"
  - "*/node_modules/*"
  - "*/.venv/*"
  - "*/target/*"
validation_skip_paths: []

# Mirror of scripts/config/package_policy.defaults.yml (flat document == this key).
# tests/test_checks.sh asserts they stay identical when yq is available.
package_policy:
  python:
    triggers:
      - pyproject.toml
      - requirements.in
      - requirements.txt
      - requirements-dev.in
      - requirements-dev.txt
    satisfiers:
      - requirements.txt
      - requirements-dev.txt
      - poetry.lock
      - uv.lock
    allowed_trigger_combinations:
      - - requirements.in
        - requirements.txt
      - - requirements-dev.in
        - requirements-dev.txt
      - - pyproject.toml
        - requirements.txt
    hash_validators:
      requirements.txt: pip_requirements_txt_hashes
      requirements-dev.txt: pip_requirements_txt_hashes
      poetry.lock: poetry_lock_hashes
      uv.lock: uv_lock_hashes

# Minimal overlay examples for consumer repos: see README (Dateiscan-Overlay).
