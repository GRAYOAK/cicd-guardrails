name: Release

# ─────────────────────────────────────────────────────────────────────────────
# Release pipeline driven by release-please.
#
# Conventional Commits on `main` → release-please opens / updates a "release PR"
# that bumps the version in .release-please-manifest.json and updates CHANGELOG.md.
#
# When that release PR is merged, release-please atomically creates:
#   - the GitHub Release `vX.Y.Z`
#   - the matching git tag `vX.Y.Z`
#
# A second job then assembles `migrations/v<X.Y.Z>.md` from the snippets that
# were collected under `migrations/.unreleased/` and uploads it as a release
# asset together with `CHANGELOG.md`.
#
# Consumer repos must keep pinning the reusable workflow on a 40-character
# commit SHA. Tags are reference markers only.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:

  # ── Open / update release PR, or cut a release when the PR is merged ──────
  release-please:
    name: 'release-please'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
      version: ${{ steps.rp.outputs.version }}
      major: ${{ steps.rp.outputs.major }}
      minor: ${{ steps.rp.outputs.minor }}
      patch: ${{ steps.rp.outputs.patch }}
    steps:
      # App token must be minted in this job: GitHub blocks passing tokens via job outputs.
      - id: release-app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3.2.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - id: rp
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7  # v5.0.0 (Node 24)
        with:
          token: ${{ steps.release-app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # ── Consolidate migration snippets into a per-version migration file ──────
  assemble-migration:
    name: 'Assemble migration notes'
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.release-please.outputs.version }}
      TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
    steps:
      - id: release-app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3.2.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout main at the new tag
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          ref: main
          fetch-depth: 0
          token: ${{ steps.release-app-token.outputs.token }}

      - name: Determine previous version
        id: prev
        run: |
          set -euo pipefail
          PREV="$(git tag --list 'v*.*.*' --sort=-v:refname | grep -vx "${TAG_NAME}" | head -n1 || true)"
          if [ -z "$PREV" ]; then
            PREV="none"
          fi
          echo "previous=${PREV}" >> "$GITHUB_OUTPUT"
          echo "Previous version: ${PREV}"

      - name: Assemble migrations/v${{ env.VERSION }}.md
        env:
          PREV_VERSION: ${{ steps.prev.outputs.previous }}
        run: |
          set -euo pipefail
          OUT="migrations/v${VERSION}.md"
          mkdir -p migrations/.unreleased

          shopt -s nullglob
          SNIPPETS=( migrations/.unreleased/*.md )

          RELEASED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          if [ ${#SNIPPETS[@]} -eq 0 ]; then
            SEVERITY="none"
          else
            SEVERITY="see-snippets"
          fi

          {
            echo "---"
            echo "version: ${VERSION}"
            echo "previous_version: ${PREV_VERSION}"
            echo "released_at: ${RELEASED_AT}"
            echo "severity: ${SEVERITY}"
            echo "---"
            echo
            echo "# Migration notes for v${VERSION}"
            echo
            if [ ${#SNIPPETS[@]} -eq 0 ]; then
              echo "No migration steps required for this release."
            else
              echo "Apply the following changes to consumer repositories before pinning the new SHA."
              echo
              for f in $(printf '%s\n' "${SNIPPETS[@]}" | sort); do
                base="$(basename "$f" .md)"
                echo "## Change: ${base}"
                echo
                cat "$f"
                echo
              done
            fi
          } > "$OUT"

          if [ ${#SNIPPETS[@]} -gt 0 ]; then
            git rm -f "${SNIPPETS[@]}"
          fi
          git add "$OUT"

      - name: Commit migration notes back to main
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          if git diff --cached --quiet; then
            echo 'No migration notes to commit.'
            exit 0
          fi

          git commit -m "chore(release): finalize migration notes for ${TAG_NAME} [skip ci]"
          git push origin main

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ steps.release-app-token.outputs.token }}
        run: |
          set -euo pipefail
          ASSETS=( "migrations/v${VERSION}.md" CHANGELOG.md )
          IMMUTABLE="$(
            gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${TAG_NAME}" \
              --jq '.immutable // false' 2>/dev/null || echo false
          )"
          if [ "$IMMUTABLE" = "true" ]; then
            echo "::notice::Release is immutable; cannot add or replace assets. Skipping upload."
            echo "Migration notes and changelog are still on the default branch (see migrations/ and CHANGELOG.md)."
            exit 0
          fi
          gh release upload "${TAG_NAME}" "${ASSETS[@]}" --clobber

  # ── Optional: tell pinned demo repos to open a bump PR (GitHub App installation) ─
  notify-demo-repos:
    name: Dispatch demo consumer pin bump
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
      REPO_OWNER: ${{ github.repository_owner }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          ref: ${{ env.TAG_NAME }}
          fetch-depth: 1
          persist-credentials: false

      - name: Mint installation token for consumer dispatches
        id: dispatch-app-token
        continue-on-error: true
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3.2.0
        with:
          app-id: ${{ secrets.GUARDRAILS_CONSUMER_DISPATCH_APP_ID }}
          private-key: ${{ secrets.GUARDRAILS_CONSUMER_DISPATCH_APP_PRIVATE_KEY }}
          owner: ${{ env.REPO_OWNER }}
          repositories: |
            ${{ env.REPO_OWNER }}/cicd-demo-errors
            ${{ env.REPO_OWNER }}/cicd-demo-well
          permission-contents: write

      - name: Skip demo dispatch when app credentials are not configured
        if: ${{ steps.dispatch-app-token.outcome != 'success' }}
        run: |
          echo "Skipping demo-repo dispatch (mint GitHub App token step did not succeed)."
          echo "Add secrets GUARDRAILS_CONSUMER_DISPATCH_APP_ID and GUARDRAILS_CONSUMER_DISPATCH_APP_PRIVATE_KEY"
          echo "and install that app on cicd-demo-errors and cicd-demo-well with Contents: Read and write."

      - name: Resolve tag commit and notify consumer repositories
        if: ${{ steps.dispatch-app-token.outcome == 'success' }}
        env:
          GH_TOKEN: ${{ steps.dispatch-app-token.outputs.token }}
        run: |
          set -euo pipefail
          SHA="$(git rev-parse HEAD)"
          if ! printf '%s' "$SHA" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "Unexpected non-SHA HEAD at tag ${TAG_NAME}: ${SHA}" >&2
            exit 1
          fi
          BODY="$(jq -nc --arg sha "$SHA" --arg tag "$TAG_NAME" \
            '{event_type:"guardrails-release", client_payload:{sha:$sha, tag:$tag}}')"
          any_ok=0
          for repo in "${REPO_OWNER}/cicd-demo-errors" "${REPO_OWNER}/cicd-demo-well"; do
            if gh api --method POST "repos/${repo}/dispatches" --input - <<<"$BODY"; then
              echo "Dispatched guardrails-release to ${repo} (tag ${TAG_NAME}, sha ${SHA})."
              any_ok=1
            else
              echo "::warning::Failed to dispatch to ${repo}; check app installation and repository names."
            fi
          done
          if [ "$any_ok" -ne 1 ]; then
            echo "::error::App token was minted but every dispatch attempt failed."
            exit 1
          fi
