name: Self-Test (Dogfooding)

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:

  # ── Bash tests ────────────────────────────────────────────────────────────
  unit-tests:
    name: 'Unit Tests'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
      - run: bash tests/test_checks.sh

  # ── Dogfood these checks on this repo ─────────────────────────────────────
  self-check-prt:
    name: 'Self-Check: pull_request_target'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
      - run: bash scripts/check_prt.sh .

  self-check-pinning:
    name: 'Self-Check: Action SHA-Pinning'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
      - run: bash scripts/check_pinning.sh .

  self-check-permissions:
    name: 'Self-Check: Workflow permissions'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
      - run: bash scripts/check_permissions.sh .

  self-check-lockfiles:
    name: 'Self-Check: Dependency Lock Files'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
      - run: bash scripts/check_lockfiles.sh .
