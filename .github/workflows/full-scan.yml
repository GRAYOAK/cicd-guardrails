name: CI/CD Security Full Scan

# ─────────────────────────────────────────────────────────────────────────────
# REUSABLE WORKFLOW – aufrufbar von anderen Repos via:
#
#   jobs:
#     guardrails:
#       uses: Christopher-Rust/cicd-guardrails/.github/workflows/full-scan.yml@<SHA>
#       with:
#         strict: true
#
# Der Guardrails-SHA wird aus GITHUB_WORKFLOW_REF geparst – das ist der Ref
# mit dem dieser Workflow aufgerufen wurde (z.B. @f878a48...).
# So stimmen Workflow-Definition und Skripte immer überein.
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_call:
    inputs:
      strict:
        description: >
          true  = Build schlägt bei jedem Fund fehl (empfohlen).
          false = Findings als Annotations, Build bleibt grün (Migrationsmodus).
        type: boolean
        default: true
      skip-checks:
        description: >
          Kommagetrennte Liste von Check-IDs die übersprungen werden.
          Gültige Werte: check-prt, check-action-pinning, check-permissions,
          check-dependency-pins, check-secrets, check-runner-config,
          check-branch-protection
        type: string
        default: ''

permissions:
  contents: read

jobs:

  # ── Setup: Guardrails-SHA aus Workflow-Ref extrahieren ────────────────────
  setup:
    name: 'Setup'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      guardrails-ref: ${{ steps.ref.outputs.ref }}
    steps:
      - name: Guardrails-Ref aus GITHUB_WORKFLOW_REF ermitteln
        id: ref
        # GITHUB_WORKFLOW_REF = "owner/repo/.github/workflows/file.yml@<SHA>"
        # Nach dem letzten @ ist der exakte Ref mit dem dieser Workflow aufgerufen wurde
        run: |
          REF="${GITHUB_WORKFLOW_REF##*@}"
          echo "ref=$REF" >> $GITHUB_OUTPUT
          echo "Guardrails-Ref: $REF"

  # ── 1. pull_request_target ────────────────────────────────────────────────
  check-prt:
    name: '🚨 pull_request_target'
    needs: setup
    if: ${{ !contains(inputs.skip-checks, 'check-prt') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout aufrufendes Repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          path: target

      - name: Checkout Guardrails-Skripte
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          repository: Christopher-Rust/cicd-guardrails
          ref: ${{ needs.setup.outputs.guardrails-ref }}
          path: guardrails

      - run: bash guardrails/scripts/check_prt.sh target

  # ── 2. Action SHA-Pinning ─────────────────────────────────────────────────
  check-action-pinning:
    name: '📌 Action SHA-Pinning'
    needs: setup
    if: ${{ !contains(inputs.skip-checks, 'check-action-pinning') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          path: target

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          repository: Christopher-Rust/cicd-guardrails
          ref: ${{ needs.setup.outputs.guardrails-ref }}
          path: guardrails

      - run: bash guardrails/scripts/check_pinning.sh target

  # ── 3. Workflow-Permissions ───────────────────────────────────────────────
  check-permissions:
    name: '🔐 Workflow-Permissions'
    needs: setup
    if: ${{ !contains(inputs.skip-checks, 'check-permissions') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          path: target

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          repository: Christopher-Rust/cicd-guardrails
          ref: ${{ needs.setup.outputs.guardrails-ref }}
          path: guardrails

      - run: bash guardrails/scripts/check_permissions.sh target

  # ── 4. Dependency Lock Files ──────────────────────────────────────────────
  check-dependency-pins:
    name: '🔒 Dependency Lock Files'
    needs: setup
    if: ${{ !contains(inputs.skip-checks, 'check-dependency-pins') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          path: target

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          repository: Christopher-Rust/cicd-guardrails
          ref: ${{ needs.setup.outputs.guardrails-ref }}
          path: guardrails

      - run: bash guardrails/scripts/check_lockfiles.sh target

  # ── 5. Secret Scanning ────────────────────────────────────────────────────
  check-secrets:
    name: '🕵️ Secret Scanning (gitleaks)'
    needs: setup
    if: ${{ !contains(inputs.skip-checks, 'check-secrets') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Installiere gitleaks
        run: |
          GITLEAKS_VERSION="8.21.2"
          BASE="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"
          curl -sSL -o gitleaks.tar.gz    "${BASE}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSL -o checksums.txt      "${BASE}/gitleaks_${GITLEAKS_VERSION}_checksums.txt"
          grep "linux_x64.tar.gz" checksums.txt | sha256sum -c
          tar xzf gitleaks.tar.gz gitleaks

      - name: Scanne auf Secrets
        run: ./gitleaks detect --source . --exit-code 1 --redact

  # ── 6. Runner-Konfiguration ───────────────────────────────────────────────
  check-runner-config:
    name: '🖥️ Runner-Konfiguration'
    needs: setup
    if: ${{ !contains(inputs.skip-checks, 'check-runner-config') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          path: target

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          repository: Christopher-Rust/cicd-guardrails
          ref: ${{ needs.setup.outputs.guardrails-ref }}
          path: guardrails

      - run: bash guardrails/scripts/check_runner_config.sh target ${{ inputs.strict && '--strict' || '' }}

  # ── 7. Branch Protection ──────────────────────────────────────────────────
  check-branch-protection:
    name: '🛡️ Branch Protection'
    needs: setup
    if: ${{ !contains(inputs.skip-checks, 'check-branch-protection') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      administration: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          repository: Christopher-Rust/cicd-guardrails
          ref: ${{ needs.setup.outputs.guardrails-ref }}
          path: guardrails

      - run: bash guardrails/scripts/check_branch_protection.sh ${{ inputs.strict && '--strict' || '' }}
        env:
          GH_TOKEN: ${{ github.token }}
