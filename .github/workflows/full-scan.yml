name: CI/CD Security Full Scan

# ─────────────────────────────────────────────────────────────────────────────
# REUSABLE WORKFLOW – callable from other repos via:
#
#   jobs:
#     guardrails:
#       uses: Christopher-Rust/cicd-guardrails/.github/workflows/full-scan.yml@<SHA>
#       with:
#         strict: true
#
# The guardrails SHA is parsed from GITHUB_WORKFLOW_REF – the exact ref used
# when this reusable workflow was invoked (for example @f878a48...).
# This keeps workflow definition and scripts in sync.
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_call:
    inputs:
      strict:
        description: >
          true  = Fail the job on any finding (recommended).
          false = Emit findings as annotations while keeping the job green (migration mode).
        type: boolean
        default: true
      skip-checks:
        description: >
          Comma-separated list of check IDs to skip.
          Valid values: cicd-sec-01-flow, cicd-sec-03, cicd-sec-04,
          cicd-sec-05-branch, cicd-sec-05-permissions, cicd-sec-05-runner-access,
          cicd-sec-06, cicd-sec-07-runner-hardening, cicd-sec-08
        type: string
        default: ''
    secrets:
      admin-token:
        description: >
          PAT used for branch-protection verification and check.
        required: false

permissions:
  contents: read

jobs:

  # ── Setup: extract guardrails ref from workflow call ─────────────────────
  setup:
    name: 'Setup'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      guardrails-ref: ${{ steps.ref.outputs.ref }}
    steps:
      - name: Extract guardrails ref from GITHUB_WORKFLOW_REF
        id: ref
        # GITHUB_WORKFLOW_REF = "owner/repo/.github/workflows/file.yml@<SHA>"
        # After the last @ is the exact ref used to invoke this workflow.
        run: |
          REF="${GITHUB_WORKFLOW_REF##*@}"
          echo "ref=$REF" >> $GITHUB_OUTPUT
          echo "Guardrails-Ref: $REF"

  # ── Result aggregation ────────────────────────────────────────────────────
  summarize:
    name: '📊 Risk summary'
    needs:
      - setup
      - cicd-sec-04
      - cicd-sec-08
      - cicd-sec-05-permissions
      - cicd-sec-03
      - cicd-sec-06
      - cicd-sec-01-flow
      - cicd-sec-05-branch
      - cicd-sec-05-runner-access
      - cicd-sec-07-runner-hardening
    if: ${{ always() }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          path: target

      - name: Checkout guardrails scripts
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          repository: Christopher-Rust/cicd-guardrails
          ref: ${{ needs.setup.outputs.guardrails-ref }}
          path: guardrails

      - name: Download check artifacts (best-effort)
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131  # v7.0.0
        continue-on-error: true
        with:
          path: guardrails-results

      - name: Install yq (for .guardrails.yml)
        run: |
          YQ_VERSION="v4.45.1"
          BASE="https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}"
          curl -sSL -o yq "${BASE}/yq_linux_amd64"
          chmod +x yq
          sudo mv yq /usr/local/bin/yq

      - name: Generate risk summary
        run: bash guardrails/scripts/aggregate_risk_summary.sh target guardrails-results

  # ── CICD-SEC-04: pull_request_target ──────────────────────────────────────
  cicd-sec-04:
    name: '🚨 CICD-SEC-04 (pull_request_target)'
    needs: setup
    if: ${{ !contains(inputs.skip-checks, 'cicd-sec-04') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          path: target

      - name: Checkout guardrails scripts
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          repository: Christopher-Rust/cicd-guardrails
          ref: ${{ needs.setup.outputs.guardrails-ref }}
          path: guardrails

      - run: bash guardrails/scripts/checks/domain/cicd_sec_04.sh target
        env:
          GUARDRAILS_RESULT_DIR: guardrails-results

      - name: Upload results
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: guardrails-results-cicd-sec-04
          path: guardrails-results/*.json
          if-no-files-found: ignore

  # ── CICD-SEC-08: Action SHA-Pinning ───────────────────────────────────────
  cicd-sec-08:
    name: '📌 CICD-SEC-08 (Action SHA-Pinning)'
    needs: setup
    if: ${{ !contains(inputs.skip-checks, 'cicd-sec-08') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          path: target

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          repository: Christopher-Rust/cicd-guardrails
          ref: ${{ needs.setup.outputs.guardrails-ref }}
          path: guardrails

      - run: bash guardrails/scripts/checks/domain/cicd_sec_08.sh target
        env:
          GUARDRAILS_RESULT_DIR: guardrails-results

      - name: Upload results
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: guardrails-results-cicd-sec-08
          path: guardrails-results/*.json
          if-no-files-found: ignore

  # ── CICD-SEC-05-PERMISSIONS: Workflow permissions ─────────────────────────
  cicd-sec-05-permissions:
    name: '🔐 CICD-SEC-05-PERMISSIONS (Workflow permissions)'
    needs: setup
    if: ${{ !contains(inputs.skip-checks, 'cicd-sec-05-permissions') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          path: target

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          repository: Christopher-Rust/cicd-guardrails
          ref: ${{ needs.setup.outputs.guardrails-ref }}
          path: guardrails

      - run: bash guardrails/scripts/checks/domain/cicd_sec_05_permissions.sh target
        env:
          GUARDRAILS_RESULT_DIR: guardrails-results

      - name: Upload results
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: guardrails-results-cicd-sec-05-permissions
          path: guardrails-results/*.json
          if-no-files-found: ignore

  # ── CICD-SEC-03: Dependency Lock Files ────────────────────────────────────
  cicd-sec-03:
    name: '🔒 CICD-SEC-03 (Dependency Lock Files)'
    needs: setup
    if: ${{ !contains(inputs.skip-checks, 'cicd-sec-03') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          path: target

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          repository: Christopher-Rust/cicd-guardrails
          ref: ${{ needs.setup.outputs.guardrails-ref }}
          path: guardrails

      - run: bash guardrails/scripts/checks/domain/cicd_sec_03.sh target
        env:
          GUARDRAILS_RESULT_DIR: guardrails-results

      - name: Upload results
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: guardrails-results-cicd-sec-03
          path: guardrails-results/*.json
          if-no-files-found: ignore

  # ── CICD-SEC-06: Secret scanning ──────────────────────────────────────────
  cicd-sec-06:
    name: '🕵️ CICD-SEC-06 (Secret Scanning)'
    needs: setup
    if: ${{ !contains(inputs.skip-checks, 'cicd-sec-06') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          fetch-depth: 0
          path: target

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          repository: Christopher-Rust/cicd-guardrails
          ref: ${{ needs.setup.outputs.guardrails-ref }}
          path: guardrails

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION="8.21.2"
          BASE="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"
          curl -sSL -o gitleaks.tar.gz    "${BASE}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSL -o checksums.txt      "${BASE}/gitleaks_${GITLEAKS_VERSION}_checksums.txt"
          grep "linux_x64.tar.gz" checksums.txt | sha256sum -c
          tar xzf gitleaks.tar.gz gitleaks

      - name: Scan for secrets
        run: bash guardrails/scripts/checks/domain/cicd_sec_06.sh target
        env:
          GUARDRAILS_RESULT_DIR: guardrails-results

      - name: Upload results
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: guardrails-results-cicd-sec-06
          path: guardrails-results/*.json
          if-no-files-found: ignore

  # ── CICD-SEC-01-FLOW: Flow control ────────────────────────────────────────
  cicd-sec-01-flow:
    name: '🧭 CICD-SEC-01-FLOW (Flow control)'
    needs: setup
    if: ${{ !contains(inputs.skip-checks, 'cicd-sec-01-flow') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          path: target

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          repository: Christopher-Rust/cicd-guardrails
          ref: ${{ needs.setup.outputs.guardrails-ref }}
          path: guardrails

      - run: bash guardrails/scripts/checks/domain/cicd_sec_01_flow.sh target ${{ inputs.strict && '--strict' || '' }}
        env:
          GH_TOKEN: ${{ secrets['admin-token'] || github.token }}
          GUARDRAILS_RESULT_DIR: guardrails-results

      - name: Upload results
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: guardrails-results-cicd-sec-01-flow
          path: guardrails-results/*.json
          if-no-files-found: ignore

  # ── CICD-SEC-05-BRANCH: Branch governance and PBAC ────────────────────────
  cicd-sec-05-branch:
    name: '🛂 CICD-SEC-05-BRANCH (Branch governance and PBAC)'
    needs: setup
    if: ${{ !contains(inputs.skip-checks, 'cicd-sec-05-branch') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          path: target

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          repository: Christopher-Rust/cicd-guardrails
          ref: ${{ needs.setup.outputs.guardrails-ref }}
          path: guardrails

      - run: bash guardrails/scripts/checks/domain/cicd_sec_05_branch.sh target ${{ inputs.strict && '--strict' || '' }}
        env:
          GH_TOKEN: ${{ secrets['admin-token'] || github.token }}
          GUARDRAILS_RESULT_DIR: guardrails-results

      - name: Upload results
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: guardrails-results-cicd-sec-05-branch
          path: guardrails-results/*.json
          if-no-files-found: ignore

  # ── CICD-SEC-05-RUNNER-ACCESS: Runner access policy ───────────────────────
  cicd-sec-05-runner-access:
    name: '🖥️ CICD-SEC-05-RUNNER-ACCESS (Runner access policy)'
    needs: setup
    if: ${{ !contains(inputs.skip-checks, 'cicd-sec-05-runner-access') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          path: target

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          repository: Christopher-Rust/cicd-guardrails
          ref: ${{ needs.setup.outputs.guardrails-ref }}
          path: guardrails

      - run: bash guardrails/scripts/checks/domain/cicd_sec_05_runner_access.sh target ${{ inputs.strict && '--strict' || '' }}
        env:
          GUARDRAILS_RESULT_DIR: guardrails-results

      - name: Upload results
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: guardrails-results-cicd-sec-05-runner-access
          path: guardrails-results/*.json
          if-no-files-found: ignore

  # ── CICD-SEC-07-RUNNER-HARDENING: Runner hardening ────────────────────────
  cicd-sec-07-runner-hardening:
    name: '🧱 CICD-SEC-07-RUNNER-HARDENING (Runner hardening)'
    needs: setup
    if: ${{ !contains(inputs.skip-checks, 'cicd-sec-07-runner-hardening') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          path: target

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          repository: Christopher-Rust/cicd-guardrails
          ref: ${{ needs.setup.outputs.guardrails-ref }}
          path: guardrails

      - run: bash guardrails/scripts/checks/domain/cicd_sec_07_runner_hardening.sh target ${{ inputs.strict && '--strict' || '' }}
        env:
          GUARDRAILS_RESULT_DIR: guardrails-results

      - name: Upload results
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: guardrails-results-cicd-sec-07-runner-hardening
          path: guardrails-results/*.json
          if-no-files-found: ignore
