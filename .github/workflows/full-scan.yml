name: CI/CD Security Full Scan

# ─────────────────────────────────────────────────────────────────────────────
# REUSABLE WORKFLOW – callable from other repos via:
#
#   jobs:
#     guardrails:
#       uses: Christopher-Rust/cicd-guardrails/.github/workflows/full-scan.yml@<SHA>
#       with:
#         strict: true
#
# Cross-repo workflow_call: pass guardrails-repository and guardrails-ref inputs
# matching the uses: ...@<SHA> pin (GITHUB_WORKFLOW_REF points at the caller).
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_call:
    inputs:
      strict:
        description: >
          true  = Fail the job on any finding (recommended).
          false = Emit findings as annotations while keeping the job green (migration mode).
        type: boolean
        default: true
      skip-checks:
        description: >
          Comma-separated list of check IDs to skip.
          Valid values: cicd-sec-01-flow, cicd-sec-03, cicd-sec-04,
          cicd-sec-05-branch, cicd-sec-05-permissions, cicd-sec-05-runner-access,
          cicd-sec-06, cicd-sec-07-runner-hardening, cicd-sec-08
        type: string
        default: ''
      guardrails-repository:
        description: >
          Owner/repo of the guardrails source (must match the uses: repository pin).
        type: string
        required: true
      guardrails-ref:
        description: >
          40-character commit SHA of the guardrails pin (same as in uses: ...@<SHA>).
        type: string
        required: true
    secrets:
      admin-token:
        description: >
          PAT used for branch-protection verification and check.
        required: false

permissions:
  contents: read

jobs:

  # ── Setup: validate caller-supplied guardrails pin (required for cross-repo calls) ─
  setup:
    name: 'Setup'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      guardrails-ref: ${{ inputs.guardrails-ref }}
      guardrails-repository: ${{ inputs.guardrails-repository }}
    steps:
      - name: Validate guardrails repository and ref inputs
        run: |
          set -euo pipefail
          REPO="${{ inputs.guardrails-repository }}"
          REF="${{ inputs.guardrails-ref }}"
          if [[ "$REPO" != */* ]]; then
            echo "::error::guardrails-repository must be owner/repo, got: ${REPO}"
            exit 1
          fi
          if [[ ! "$REF" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::guardrails-ref must be a 40-character commit SHA, got: ${REF}"
            exit 1
          fi
          echo "Guardrails-Repository: ${REPO}"
          echo "Guardrails-Ref: ${REF}"

      - name: Verify guardrails repository is reachable
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          repository: ${{ inputs.guardrails-repository }}
          ref: ${{ inputs.guardrails-ref }}
          path: guardrails-probe
          fetch-depth: 1

      - name: Verify guardrails scripts are present
        run: |
          set -euo pipefail
          SCRIPT="guardrails-probe/scripts/checks/domain/cicd_sec_03.sh"
          if [[ ! -f "$SCRIPT" ]]; then
            echo "::error::Guardrails checkout at ${{ inputs.guardrails-ref }} does not contain expected scripts (missing ${SCRIPT})."
            echo "::error::Check guardrails-repository (${{ inputs.guardrails-repository }}), org Actions policy, and that the SHA matches your uses: pin."
            exit 1
          fi
          echo "Guardrails scripts verified at pinned ref."

  # ── Result aggregation ────────────────────────────────────────────────────
  summarize:
    name: '📊 Risk summary'
    needs:
      - setup
      - cicd-sec-04
      - cicd-sec-08
      - cicd-sec-05-permissions
      - cicd-sec-03
      - cicd-sec-06
      - cicd-sec-01-flow
      - cicd-sec-05-branch
      - cicd-sec-05-runner-access
      - cicd-sec-07-runner-hardening
    if: ${{ always() }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          path: scan_repo

      - name: Checkout guardrails scripts
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          repository: ${{ inputs.guardrails-repository }}
          ref: ${{ inputs.guardrails-ref }}
          path: guardrails

      - name: Download check artifacts (best-effort)
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131  # v7.0.0
        continue-on-error: true
        with:
          path: guardrails-results

      - name: Install yq (for .guardrails.yml)
        run: |
          YQ_VERSION="v4.45.1"
          BASE="https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}"
          curl -sSL -o yq "${BASE}/yq_linux_amd64"
          chmod +x yq
          sudo mv yq /usr/local/bin/yq

      - name: Generate risk summary
        run: bash guardrails/scripts/aggregate_risk_summary.sh scan_repo guardrails-results

  # ── CICD-SEC-04: pull_request_target ──────────────────────────────────────
  cicd-sec-04:
    name: '🧩 Code | 🚨 04 — pull request target trigger'
    needs: setup
    if: ${{ !contains(inputs.skip-checks, 'cicd-sec-04') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          path: scan_repo

      - name: Checkout guardrails scripts
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          repository: ${{ inputs.guardrails-repository }}
          ref: ${{ inputs.guardrails-ref }}
          path: guardrails

      - run: bash guardrails/scripts/checks/domain/cicd_sec_04.sh scan_repo
        env:
          GUARDRAILS_RESULT_DIR: guardrails-results

      - name: Upload results
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: guardrails-results-cicd-sec-04
          path: guardrails-results/*.json
          if-no-files-found: ignore

  # CICD-SEC-08 scans composite actions under actions/ only. Workflow YAML pinning
  # under .github/workflows is covered by CICD-SEC-03 to avoid duplicate findings.
  # ── CICD-SEC-08: Action SHA-Pinning (composite actions) ───────────────────
  cicd-sec-08:
    name: '🧩 Code | 📌 08 — Action SHA pinning'
    needs: setup
    if: ${{ !contains(inputs.skip-checks, 'cicd-sec-08') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          path: scan_repo

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          repository: ${{ inputs.guardrails-repository }}
          ref: ${{ inputs.guardrails-ref }}
          path: guardrails

      - run: bash guardrails/scripts/checks/domain/cicd_sec_08.sh scan_repo
        env:
          GUARDRAILS_RESULT_DIR: guardrails-results

      - name: Upload results
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: guardrails-results-cicd-sec-08
          path: guardrails-results/*.json
          if-no-files-found: ignore

  # ── CICD-SEC-05-PERMISSIONS: Workflow permissions ─────────────────────────
  cicd-sec-05-permissions:
    name: '🧩 Code | 🔐 05-permissions — Workflow permissions'
    needs: setup
    if: ${{ !contains(inputs.skip-checks, 'cicd-sec-05-permissions') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          path: scan_repo

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          repository: ${{ inputs.guardrails-repository }}
          ref: ${{ inputs.guardrails-ref }}
          path: guardrails

      - run: bash guardrails/scripts/checks/domain/cicd_sec_05_permissions.sh scan_repo
        env:
          GUARDRAILS_RESULT_DIR: guardrails-results

      - name: Upload results
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: guardrails-results-cicd-sec-05-permissions
          path: guardrails-results/*.json
          if-no-files-found: ignore

  # ── CICD-SEC-03: Dependency Lock Files ────────────────────────────────────
  cicd-sec-03:
    name: '🧩 Code | 🔒 03 — Dependency lockfiles'
    needs: setup
    if: ${{ !contains(inputs.skip-checks, 'cicd-sec-03') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          path: scan_repo

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          repository: ${{ inputs.guardrails-repository }}
          ref: ${{ inputs.guardrails-ref }}
          path: guardrails

      - run: bash guardrails/scripts/checks/domain/cicd_sec_03.sh scan_repo ${{ inputs.strict && '--strict' || '' }}
        env:
          GUARDRAILS_RESULT_DIR: guardrails-results

      - name: Upload results
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: guardrails-results-cicd-sec-03
          path: guardrails-results/*.json
          if-no-files-found: ignore

  # ── CICD-SEC-06: Secret scanning ──────────────────────────────────────────
  cicd-sec-06:
    name: '🧩 Code | 🕵️ 06 — Secret scanning'
    needs: setup
    if: ${{ !contains(inputs.skip-checks, 'cicd-sec-06') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          fetch-depth: 0
          path: scan_repo

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          repository: ${{ inputs.guardrails-repository }}
          ref: ${{ inputs.guardrails-ref }}
          path: guardrails

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION="8.21.2"
          BASE="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"
          curl -sSL -o gitleaks.tar.gz    "${BASE}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSL -o checksums.txt      "${BASE}/gitleaks_${GITLEAKS_VERSION}_checksums.txt"
          grep "linux_x64.tar.gz" checksums.txt | sha256sum -c
          tar xzf gitleaks.tar.gz gitleaks

      - name: Scan for secrets
        run: bash guardrails/scripts/checks/domain/cicd_sec_06.sh scan_repo
        env:
          GUARDRAILS_RESULT_DIR: guardrails-results

      - name: Upload results
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: guardrails-results-cicd-sec-06
          path: guardrails-results/*.json
          if-no-files-found: ignore

  # ── CICD-SEC-01-FLOW: Flow control ────────────────────────────────────────
  cicd-sec-01-flow:
    name: '⚙️ Settings | 🧭 01-flow — Flow control'
    needs: setup
    if: ${{ !contains(inputs.skip-checks, 'cicd-sec-01-flow') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          path: scan_repo

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          repository: ${{ inputs.guardrails-repository }}
          ref: ${{ inputs.guardrails-ref }}
          path: guardrails

      - run: bash guardrails/scripts/checks/domain/cicd_sec_01_flow.sh scan_repo ${{ inputs.strict && '--strict' || '' }}
        env:
          GH_TOKEN: ${{ secrets['admin-token'] || github.token }}
          GUARDRAILS_RESULT_DIR: guardrails-results

      - name: Upload results
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: guardrails-results-cicd-sec-01-flow
          path: guardrails-results/*.json
          if-no-files-found: ignore

  # ── CICD-SEC-05-BRANCH: Branch governance and PBAC ────────────────────────
  cicd-sec-05-branch:
    name: '⚙️ Settings | 🛂 05-branch — Branch governance'
    needs: setup
    if: ${{ !contains(inputs.skip-checks, 'cicd-sec-05-branch') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          path: scan_repo

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          repository: ${{ inputs.guardrails-repository }}
          ref: ${{ inputs.guardrails-ref }}
          path: guardrails

      - run: bash guardrails/scripts/checks/domain/cicd_sec_05_branch.sh scan_repo ${{ inputs.strict && '--strict' || '' }}
        env:
          GH_TOKEN: ${{ secrets['admin-token'] || github.token }}
          GUARDRAILS_RESULT_DIR: guardrails-results

      - name: Upload results
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: guardrails-results-cicd-sec-05-branch
          path: guardrails-results/*.json
          if-no-files-found: ignore

  # ── CICD-SEC-05-RUNNER-ACCESS: Runner access policy ───────────────────────
  cicd-sec-05-runner-access:
    name: '🧩 Code | 🖥️ 05-runner-access — Runner access'
    needs: setup
    if: ${{ !contains(inputs.skip-checks, 'cicd-sec-05-runner-access') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          path: scan_repo

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          repository: ${{ inputs.guardrails-repository }}
          ref: ${{ inputs.guardrails-ref }}
          path: guardrails

      - run: bash guardrails/scripts/checks/domain/cicd_sec_05_runner_access.sh scan_repo ${{ inputs.strict && '--strict' || '' }}
        env:
          GUARDRAILS_RESULT_DIR: guardrails-results

      - name: Upload results
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: guardrails-results-cicd-sec-05-runner-access
          path: guardrails-results/*.json
          if-no-files-found: ignore

  # ── CICD-SEC-07-RUNNER-HARDENING: Runner hardening ────────────────────────
  cicd-sec-07-runner-hardening:
    name: '🧩 Code | 🧱 07-runner-hardening — Runner hardening'
    needs: setup
    if: ${{ !contains(inputs.skip-checks, 'cicd-sec-07-runner-hardening') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          path: scan_repo

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          repository: ${{ inputs.guardrails-repository }}
          ref: ${{ inputs.guardrails-ref }}
          path: guardrails

      - run: bash guardrails/scripts/checks/domain/cicd_sec_07_runner_hardening.sh scan_repo ${{ inputs.strict && '--strict' || '' }}
        env:
          GUARDRAILS_RESULT_DIR: guardrails-results

      - name: Upload results
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: guardrails-results-cicd-sec-07-runner-hardening
          path: guardrails-results/*.json
          if-no-files-found: ignore
