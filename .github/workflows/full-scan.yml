name: CI/CD Security Full Scan

# ─────────────────────────────────────────────────────────────────────────────
# REUSABLE WORKFLOW – callable from other repos via:
#
#   jobs:
#     guardrails:
#       uses: Christopher-Rust/cicd-guardrails/.github/workflows/full-scan.yml@<SHA>
#       with:
#         strict: true
#
# The guardrails SHA is parsed from GITHUB_WORKFLOW_REF – the exact ref used
# when this reusable workflow was invoked (for example @f878a48...).
# This keeps workflow definition and scripts in sync.
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_call:
    inputs:
      strict:
        description: >
          true  = Fail the job on any finding (recommended).
          false = Emit findings as annotations while keeping the job green (migration mode).
        type: boolean
        default: true
      skip-checks:
        description: >
          Comma-separated list of check IDs to skip.
          Valid values: check-prt, check-action-pinning, check-permissions,
          check-dependency-pins, check-secrets, check-flow-control,
          check-pbac-branch-policy, check-runner-access, check-runner-hardening
        type: string
        default: ''
    secrets:
      admin-token:
        description: >
          PAT used for branch-protection verification and check.
        required: false

permissions:
  contents: read

jobs:

  # ── Setup: extract guardrails ref from workflow call ─────────────────────
  setup:
    name: 'Setup'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      guardrails-ref: ${{ steps.ref.outputs.ref }}
    steps:
      - name: Extract guardrails ref from GITHUB_WORKFLOW_REF
        id: ref
        # GITHUB_WORKFLOW_REF = "owner/repo/.github/workflows/file.yml@<SHA>"
        # Nach dem letzten @ ist der exakte Ref mit dem dieser Workflow aufgerufen wurde
        run: |
          REF="${GITHUB_WORKFLOW_REF##*@}"
          echo "ref=$REF" >> $GITHUB_OUTPUT
          echo "Guardrails-Ref: $REF"

  # ── Result aggregation ────────────────────────────────────────────────────
  summarize:
    name: '📊 Risk summary'
    needs:
      - setup
      - check-prt
      - check-action-pinning
      - check-permissions
      - check-dependency-pins
      - check-secrets
      - check-flow-control
      - check-pbac-branch-policy
      - check-runner-access
      - check-runner-hardening
    if: ${{ always() }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          path: target

      - name: Checkout guardrails scripts
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          repository: Christopher-Rust/cicd-guardrails
          ref: ${{ needs.setup.outputs.guardrails-ref }}
          path: guardrails

      - name: Download check artifacts (best-effort)
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131  # v7.0.0
        continue-on-error: true
        with:
          path: guardrails-results

      - name: Install yq (for .guardrails.yml)
        run: |
          YQ_VERSION="v4.45.1"
          BASE="https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}"
          curl -sSL -o yq "${BASE}/yq_linux_amd64"
          chmod +x yq
          sudo mv yq /usr/local/bin/yq

      - name: Generate risk summary
        run: bash guardrails/scripts/aggregate_risk_summary.sh target guardrails-results

  # ── 1. pull_request_target ────────────────────────────────────────────────
  check-prt:
    name: '🚨 pull_request_target'
    needs: setup
    if: ${{ !contains(inputs.skip-checks, 'check-prt') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          path: target

      - name: Checkout guardrails scripts
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          repository: Christopher-Rust/cicd-guardrails
          ref: ${{ needs.setup.outputs.guardrails-ref }}
          path: guardrails

      - run: bash guardrails/scripts/check_prt.sh target
        env:
          GUARDRAILS_RESULT_DIR: guardrails-results

      - name: Upload results
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: guardrails-results-check-prt
          path: guardrails-results/*.json
          if-no-files-found: ignore

  # ── 2. Action SHA-Pinning ─────────────────────────────────────────────────
  check-action-pinning:
    name: '📌 Action SHA-Pinning'
    needs: setup
    if: ${{ !contains(inputs.skip-checks, 'check-action-pinning') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          path: target

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          repository: Christopher-Rust/cicd-guardrails
          ref: ${{ needs.setup.outputs.guardrails-ref }}
          path: guardrails

      - run: bash guardrails/scripts/check_pinning.sh target
        env:
          GUARDRAILS_RESULT_DIR: guardrails-results

      - name: Upload results
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: guardrails-results-check-action-pinning
          path: guardrails-results/*.json
          if-no-files-found: ignore

  # ── 3. Workflow permissions ───────────────────────────────────────────────
  check-permissions:
    name: '🔐 Workflow permissions'
    needs: setup
    if: ${{ !contains(inputs.skip-checks, 'check-permissions') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          path: target

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          repository: Christopher-Rust/cicd-guardrails
          ref: ${{ needs.setup.outputs.guardrails-ref }}
          path: guardrails

      - run: bash guardrails/scripts/check_permissions.sh target
        env:
          GUARDRAILS_RESULT_DIR: guardrails-results

      - name: Upload results
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: guardrails-results-check-permissions
          path: guardrails-results/*.json
          if-no-files-found: ignore

  # ── 4. Dependency Lock Files ──────────────────────────────────────────────
  check-dependency-pins:
    name: '🔒 Dependency Lock Files'
    needs: setup
    if: ${{ !contains(inputs.skip-checks, 'check-dependency-pins') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          path: target

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          repository: Christopher-Rust/cicd-guardrails
          ref: ${{ needs.setup.outputs.guardrails-ref }}
          path: guardrails

      - run: bash guardrails/scripts/check_lockfiles.sh target
        env:
          GUARDRAILS_RESULT_DIR: guardrails-results

      - name: Upload results
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: guardrails-results-check-dependency-pins
          path: guardrails-results/*.json
          if-no-files-found: ignore

  # ── 5. Secret scanning ────────────────────────────────────────────────────
  check-secrets:
    name: '🕵️ Secret Scanning (gitleaks)'
    needs: setup
    if: ${{ !contains(inputs.skip-checks, 'check-secrets') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          fetch-depth: 0
          path: target

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          repository: Christopher-Rust/cicd-guardrails
          ref: ${{ needs.setup.outputs.guardrails-ref }}
          path: guardrails

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION="8.21.2"
          BASE="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"
          curl -sSL -o gitleaks.tar.gz    "${BASE}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSL -o checksums.txt      "${BASE}/gitleaks_${GITLEAKS_VERSION}_checksums.txt"
          grep "linux_x64.tar.gz" checksums.txt | sha256sum -c
          tar xzf gitleaks.tar.gz gitleaks

      - name: Scan for secrets
        run: bash guardrails/scripts/check_secrets.sh target
        env:
          GUARDRAILS_RESULT_DIR: guardrails-results

      - name: Upload results
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: guardrails-results-check-secrets
          path: guardrails-results/*.json
          if-no-files-found: ignore

  # ── 6. Flow control ───────────────────────────────────────────────────────
  check-flow-control:
    name: '🧭 Flow control'
    needs: setup
    if: ${{ !contains(inputs.skip-checks, 'check-flow-control') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          path: target

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          repository: Christopher-Rust/cicd-guardrails
          ref: ${{ needs.setup.outputs.guardrails-ref }}
          path: guardrails

      - run: bash guardrails/scripts/checks/domain/check_flow_control.sh ${{ inputs.strict && '--strict' || '' }}
        env:
          GH_TOKEN: ${{ secrets['admin-token'] || github.token }}
          GUARDRAILS_RESULT_DIR: guardrails-results

      - name: Upload results
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: guardrails-results-check-flow-control
          path: guardrails-results/*.json
          if-no-files-found: ignore

  # ── 7. Branch governance and PBAC ─────────────────────────────────────────
  check-pbac-branch-policy:
    name: '🛂 Branch governance and PBAC'
    needs: setup
    if: ${{ !contains(inputs.skip-checks, 'check-pbac-branch-policy') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          repository: Christopher-Rust/cicd-guardrails
          ref: ${{ needs.setup.outputs.guardrails-ref }}
          path: guardrails

      - run: bash guardrails/scripts/checks/domain/check_pbac_branch_policy.sh ${{ inputs.strict && '--strict' || '' }}
        env:
          GH_TOKEN: ${{ secrets['admin-token'] || github.token }}
          GUARDRAILS_RESULT_DIR: guardrails-results

      - name: Upload results
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: guardrails-results-check-pbac-branch-policy
          path: guardrails-results/*.json
          if-no-files-found: ignore

  # ── 8. Runner access policy ───────────────────────────────────────────────
  check-runner-access:
    name: '🖥️ Runner access policy'
    needs: setup
    if: ${{ !contains(inputs.skip-checks, 'check-runner-access') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          path: target

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          repository: Christopher-Rust/cicd-guardrails
          ref: ${{ needs.setup.outputs.guardrails-ref }}
          path: guardrails

      - run: bash guardrails/scripts/checks/domain/check_runner_access.sh target ${{ inputs.strict && '--strict' || '' }}
        env:
          GUARDRAILS_RESULT_DIR: guardrails-results

      - name: Upload results
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: guardrails-results-check-runner-access
          path: guardrails-results/*.json
          if-no-files-found: ignore

  # ── 9. Runner hardening ───────────────────────────────────────────────────
  check-runner-hardening:
    name: '🧱 Runner hardening'
    needs: setup
    if: ${{ !contains(inputs.skip-checks, 'check-runner-hardening') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          repository: Christopher-Rust/cicd-guardrails
          ref: ${{ needs.setup.outputs.guardrails-ref }}
          path: guardrails

      - run: bash guardrails/scripts/checks/domain/check_runner_hardening.sh target ${{ inputs.strict && '--strict' || '' }}
        env:
          GUARDRAILS_RESULT_DIR: guardrails-results

      - name: Upload results
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: guardrails-results-check-runner-hardening
          path: guardrails-results/*.json
          if-no-files-found: ignore
