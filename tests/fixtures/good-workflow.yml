# check_prt.py, check_pinning.py, check_permissions.py: Exit 0

name: Good – Korrekt konfigurierter Workflow

on:
  pull_request:              # ✅ pull_request statt pull_request_target
    branches: [main]
  push:
    branches: [main]

permissions:                 # ✅ Top-Level minimal
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:             # ✅ Job-Level explizit
      contents: read
    steps:
      # ✅ Alle Actions auf vollständige SHAs gepinnt
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: '3.12'

      - name: Tests
        run: pytest tests/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    permissions:             # ✅ Nur was Deploy wirklich braucht
      contents: read
      id-token: write        # Für OIDC Cloud-Auth
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Deploy
        run: echo "Deploy mit minimalen Rechten"
